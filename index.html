<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Berhasil Aktif</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px; border-radius: 24px; border: 1px solid #30363d; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; margin: 0; }
        p { color: #8b949e; margin-top: 10px; }
        .pulse { width: 12px; height: 12px; background: #238636; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #238636; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Website Aktif!</h1>
        <p>Dideploy melalui InstaDeploy Anti-404.</p>
        <div style="margin-top: 20px;"><span class="pulse"></span><small>Status: Berjalan Normal</small></div>
    </div>
</body>
</html>
